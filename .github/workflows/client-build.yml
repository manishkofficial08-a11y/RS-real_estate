name: Client Build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  client-build:
    name: Client production build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build client
        run: npm run build
