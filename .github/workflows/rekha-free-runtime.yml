name: Rekha Free Runtime

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rekha-free-runtime
  cancel-in-progress: false

jobs:
  wake-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wake Render and run a guarded Rekha cycle
        env:
          REKHA_SCHEDULER_URL: ${{ secrets.REKHA_SCHEDULER_URL }}
          REKHA_SCHEDULER_SECRET: ${{ secrets.REKHA_SCHEDULER_SECRET }}
        run: |
          test -n "$REKHA_SCHEDULER_URL"
          test -n "$REKHA_SCHEDULER_SECRET"
          curl --fail --show-error --silent \
            --retry 4 --retry-all-errors --retry-delay 20 \
            --max-time 180 \
            -X POST "$REKHA_SCHEDULER_URL" \
            -H "X-Rekha-Scheduler-Secret: $REKHA_SCHEDULER_SECRET"
